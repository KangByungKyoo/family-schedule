<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>가족 스케줄 알림판</title>
  
  <!-- CSS 연결 -->
  <link rel="stylesheet" href="style.css">  
</head>

  
<body>
  <div class="app">
    <header class="top-bar">
      <div>
        <div id="clock" class="clock">--:--</div>
        <div id="date" class="date">----</div>
      </div>
      <button class="edit-button" onclick="openEditor()">스케줄 편집</button>
    </header>

    <main class="main-board">
      <section id="currentJobBox">
        <div class="job-label">지금 할 일</div>
        <div id="currentJob" class="job-text">스케줄을 입력해주세요</div>
        <div id="currentJobTime" class="job-time"></div>
      </section>
    </main>
  </div>

  <div id="alarmScreen" class="alarm-fullscreen" onclick="hideAlarm()">
    <div>
      <div id="alarmTime" class="alarm-time"></div>
      <div id="alarmJob" class="alarm-job"></div>
      <div class="alarm-help">화면을 누르면 알람 화면이 닫힙니다</div>
    </div>
  </div>

  <aside id="editorPanel" class="editor-panel">
    <div class="editor-header">
      <h2>스케줄 편집</h2>
      <button class="close-button" onclick="closeEditor()">닫기</button>
    </div>

    <div id="scheduleList"></div>

    <div class="editor-actions">
      <button class="secondary-button" onclick="addScheduleRow()">일정 추가</button>
      <button class="primary-button" onclick="saveSchedules()">저장</button>
    </div>

    <section class="sound-section">
      <label for="soundFile">알람 소리 선택</label>
      <input id="soundFile" type="file" accept="audio/*" />
      <div class="note">
        태블릿 브라우저 정책상, 처음 한 번은 화면을 터치해야 소리가 정상 재생될 수 있습니다.<br />
        소리를 선택하지 않으면 기본 삐 소리가 재생됩니다.
      </div>
    </section>
  </aside>

  <!-- JavaScript 연결 -->
  <script src="app.js"></script>
  
</body>
</html>
